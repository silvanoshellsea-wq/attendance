<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Officer Scan - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .neo-shadow { box-shadow: 4px 4px 0px #000; }
    .neo-pressed:active { box-shadow: 2px 2px 0px #000; transform: translate(2px, 2px); }
  </style>
</head>
<body class="bg-white text-black min-h-screen flex flex-col">
  <header class="border-b-2 border-black px-6 py-4 flex justify-between items-center">
    <div class="font-['Archivo_Narrow'] font-bold text-xl uppercase">Officer Scan</div>
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL'1">signal_wifi_off</span>
      <span class="font-['Inter'] text-xs font-bold uppercase">Offline Mode</span>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center p-6">
    <div class="w-full max-w-sm">
      <div class="border-2 border-black p-6">
        <h1 class="text-2xl font-['Archivo_Narrow'] uppercase mb-6 border-b-2 border-black pb-3 flex items-center gap-2">
          <span class="material-symbols-outlined" style="font-variation-settings:'FILL'1">lock_open</span>
          Officer Login
        </h1>

        <form id="loginForm" class="space-y-5">
          <div class="relative">
            <input class="w-full border-2 border-black p-4 text-lg focus:border-[3px] focus:outline-none" id="officerCode" placeholder="Officer Code" type="text">
          </div>
          <div class="relative">
            <input class="w-full border-2 border-black p-4 text-lg focus:border-[3px] focus:outline-none" id="pin" placeholder="PIN Code" type="password">
          </div>
          <button type="submit" class="w-full bg-black text-white text-lg font-['Archivo_Narrow'] uppercase py-4 border-2 border-black neo-shadow neo-pressed hover:bg-white hover:text-black transition-colors flex items-center justify-center gap-2">
            Login
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </form>

        <div id="loginError" class="hidden mt-4 p-3 bg-red-100 border-2 border-red-600 font-['Inter'] font-bold text-sm text-center">
          Invalid officer code or PIN
        </div>

        <div class="mt-4 p-3 bg-gray-100 border font-['Inter'] text-xs">
          <strong>Demo:</strong> Code: OFFICER123, PIN: 0000
        </div>

        <div class="mt-6 border-t-2 border-black pt-4">
          <div class="flex items-center gap-2 mb-3">
            <span class="material-symbols-outlined">database</span>
            <h3 class="font-['Inter'] font-bold text-xs uppercase">Roster Setup</h3>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <button type="button" id="setupRosterBtn" class="flex items-center justify-center gap-2 border-2 border-black p-3 font-['Inter'] font-bold text-xs uppercase hover:bg-gray-100 neo-pressed">
              <span class="material-symbols-outlined">download</span>
              Download
            </button>
            <button type="button" id="loadDemoBtn" class="flex items-center justify-center gap-2 border-2 border-black p-3 font-['Inter'] font-bold text-xs uppercase hover:bg-gray-100 neo-pressed">
              <span class="material-symbols-outlined">play_circle</span>
              Load Demo
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="rosterStatus" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 border-2 border-black font-['Inter'] font-bold text-sm"></div>

  <div id="loadingIndicator" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="bg-white border-2 border-black p-6 neo-shadow">
      <div class="material-symbols-outlined text-5xl animate-spin">sync</div>
      <p id="loadingText" class="font-['Inter'] font-bold text-lg uppercase mt-4">Loading...</p>
    </div>
  </div>

  <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.App.isLoggedIn()) {
        window.location.href = 'scanner.html';
        return;
      }

      var loginForm = document.getElementById('loginForm');
      var loginError = document.getElementById('loginError');
      var setupRosterBtn = document.getElementById('setupRosterBtn');
      var loadDemoBtn = document.getElementById('loadDemoBtn');
      var rosterStatus = document.getElementById('rosterStatus');
      var loadingIndicator = document.getElementById('loadingIndicator');
      var loadingText = document.getElementById('loadingText');

      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        var officerCode = document.getElementById('officerCode').value.trim();
        var pin = document.getElementById('pin').value.trim();

        if (!officerCode || !pin) {
          showLoginError('Please enter both officer code and PIN');
          return;
        }

        if (window.App.login(officerCode, pin)) {
          window.location.href = 'scanner.html';
        } else {
          showLoginError('Invalid officer code or PIN');
        }
      });

      function showLoginError(msg) {
        loginError.textContent = msg;
        loginError.classList.remove('hidden');
      }

      function hideLoginError() {
        loginError.classList.add('hidden');
      }

      document.getElementById('officerCode').addEventListener('input', hideLoginError);
      document.getElementById('pin').addEventListener('input', hideLoginError);

      function showRosterStatus(msg, isSuccess) {
        rosterStatus.textContent = msg;
        rosterStatus.className = isSuccess
          ? 'fixed top-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 border-2 border-black bg-green-100 font-[\'Inter\'] font-bold text-sm'
          : 'fixed top-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 border-2 border-red-600 bg-red-100 font-[\'Inter\'] font-bold text-sm text-red-800';
        rosterStatus.classList.remove('hidden');
        setTimeout(function() { rosterStatus.classList.add('hidden'); }, 5000);
      }

      function showLoading(msg) {
        loadingText.textContent = msg;
        loadingIndicator.classList.remove('hidden');
      }

      function hideLoading() {
        loadingIndicator.classList.add('hidden');
      }

      setupRosterBtn.addEventListener('click', async function() {
        hideLoginError();
        try {
          showLoading('Connecting...');
          setupRosterBtn.disabled = true;
          await window.App.setupRoster(function(p) { loadingText.textContent = p; });
          hideLoading();
          showRosterStatus('Roster downloaded!', true);
          if (window.App.isLoggedIn()) {
            setTimeout(function() { window.location.href = 'scanner.html'; }, 1000);
          }
        } catch (error) {
          hideLoading();
          showRosterStatus(error.message, false);
        } finally {
          setupRosterBtn.disabled = false;
        }
      });

      loadDemoBtn.addEventListener('click', async function() {
        hideLoginError();
        try {
          showLoading('Loading demo...');
          loadDemoBtn.disabled = true;
          await window.App.loadDemoRoster();
          hideLoading();
          showRosterStatus('Demo roster loaded (10 students)!', true);
        } catch (error) {
          hideLoading();
          showRosterStatus('Failed: ' + error.message, false);
        } finally {
          loadDemoBtn.disabled = false;
        }
      });

      if (window.App.isRosterCached()) {
        showRosterStatus('Roster available offline', true);
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
