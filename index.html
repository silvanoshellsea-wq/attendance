<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1976d2">
  <meta name="description" content="Offline-first event attendance checking PWA for event officers">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AttScanner">

  <title>Attendance Scanner - Login</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Favicon (data URI for blue circle with checkmark) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%231976d2'/%3E%3Cpath d='M10 16l4 4 8-8' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <!-- Apple Touch Icon for iOS -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Ccircle cx='90' cy='90' r='85' fill='%231976d2'/%3E%3Cpath d='M55 90l23 23 52-52' stroke='white' stroke-width='11' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar online">Online</div>

  <!-- Main Container -->
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header__logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
      </div>
      <h1 class="header__title">Attendance Scanner</h1>
      <p class="header__subtitle">Event Attendance Check-in</p>
    </header>

    <!-- Login Card -->
    <div class="card">
      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label for="officerCode">Officer Code</label>
          <input
            type="text"
            id="officerCode"
            name="officerCode"
            placeholder="Enter officer code"
            autocomplete="off"
            inputmode="text"
          >
        </div>

        <div class="form-group">
          <label for="pin">PIN</label>
          <input
            type="password"
            id="pin"
            name="pin"
            placeholder="Enter PIN"
            autocomplete="off"
            inputmode="numeric"
            pattern="[0-9]*"
          >
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn--primary" id="loginBtn">
            Login
          </button>
        </div>
      </form>

      <!-- Login Error Message -->
      <div id="loginError" class="message message--error hidden">
        Invalid officer code or PIN
      </div>

      <!-- Demo Credentials Hint -->
      <div class="message message--info" style="margin-top: 16px;">
        <strong>Demo:</strong> Code: OFFICER123, PIN: 0000
      </div>
    </div>

    <!-- Roster Setup Card -->
    <div class="card">
      <h2 class="sync-section__title" style="margin-bottom: 16px;">Roster Setup</h2>

      <p class="text-center" style="color: var(--text-secondary); margin-bottom: 16px;">
        Download the student roster before the event to scan offline.
      </p>

      <div class="btn-group">
        <button type="button" class="btn btn--secondary" id="setupRosterBtn">
          Setup Roster (Online)
        </button>
        <button type="button" class="btn btn--secondary" id="loadDemoBtn">
          Load Demo Roster (Offline)
        </button>
      </div>

      <!-- Roster Status -->
      <div id="rosterStatus" class="message hidden"></div>

      <!-- Loading Indicator -->
      <div class="loading" id="loadingIndicator">
        <div class="loading__spinner"></div>
        <p class="loading__text" id="loadingText">Loading...</p>
      </div>
    </div>
  </div>

  <!-- Libraries -->
  <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>

  <!-- App Script -->
  <script src="app.js"></script>

  <!-- Page Script -->
  <script>
    // ==========================================
    // Login Page JavaScript
    // ==========================================

    document.addEventListener('DOMContentLoaded', () => {
      // Check if already logged in - redirect to scanner
      if (window.App.isLoggedIn()) {
        window.location.href = 'scanner.html';
        return;
      }

      // DOM Elements
      const loginForm = document.getElementById('loginForm');
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');
      const setupRosterBtn = document.getElementById('setupRosterBtn');
      const loadDemoBtn = document.getElementById('loadDemoBtn');
      const loadingIndicator = document.getElementById('loadingIndicator');
      const loadingText = document.getElementById('loadingText');
      const rosterStatus = document.getElementById('rosterStatus');

      // Login Form Submit
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const officerCode = document.getElementById('officerCode').value.trim();
        const pin = document.getElementById('pin').value.trim();

        if (!officerCode || !pin) {
          showLoginError('Please enter both officer code and PIN');
          return;
        }

        // Attempt login
        if (window.App.login(officerCode, pin)) {
          // Redirect to scanner
          window.location.href = 'scanner.html';
        } else {
          showLoginError('Invalid officer code or PIN');
        }
      });

      // Show login error
      function showLoginError(message) {
        loginError.textContent = message;
        loginError.classList.remove('hidden');
      }

      // Hide login error
      function hideLoginError() {
        loginError.classList.add('hidden');
      }

      // Clear error on input
      document.getElementById('officerCode').addEventListener('input', hideLoginError);
      document.getElementById('pin').addEventListener('input', hideLoginError);

      // Show loading indicator
      function showLoading(message) {
        loadingText.textContent = message;
        loadingIndicator.classList.add('active');
      }

      function hideLoading() {
        loadingIndicator.classList.remove('active');
      }

      // Show roster status message
      function showRosterStatus(message, type) {
        rosterStatus.textContent = message;
        rosterStatus.className = `message message--${type}`;
        rosterStatus.classList.remove('hidden');

        // Auto-hide after 5 seconds
        setTimeout(() => {
          rosterStatus.classList.add('hidden');
        }, 5000);
      }

      // Setup Roster Button (fetch from server)
      setupRosterBtn.addEventListener('click', async () => {
        hideLoginError();

        try {
          showLoading('Connecting to server...');
          setupRosterBtn.disabled = true;

          await window.App.setupRoster((progress) => {
            loadingText.textContent = progress;
          });

          hideLoading();
          showRosterStatus('Roster downloaded successfully!', 'success');

          // Check if logged in and redirect
          if (window.App.isLoggedIn()) {
            setTimeout(() => {
              window.location.href = 'scanner.html';
            }, 1000);
          }
        } catch (error) {
          hideLoading();
          showRosterStatus(error.message, 'error');
        } finally {
          setupRosterBtn.disabled = false;
        }
      });

      // Load Demo Roster Button (fallback)
      loadDemoBtn.addEventListener('click', async () => {
        hideLoginError();

        try {
          showLoading('Loading demo roster...');
          loadDemoBtn.disabled = true;

          await window.App.loadDemoRoster();

          hideLoading();
          showRosterStatus('Demo roster loaded (10 students)!', 'success');
        } catch (error) {
          hideLoading();
          showRosterStatus('Failed to load demo roster: ' + error.message, 'error');
        } finally {
          loadDemoBtn.disabled = false;
        }
      });

      // Check roster status on page load
      if (window.App.isRosterCached()) {
        showRosterStatus('Roster is available offline', 'success');
      }
    });

    // ==========================================
    // Service Worker Registration
    // ==========================================
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(registration => {
          console.log('Service Worker registered:', registration.scope);
        })
        .catch(error => {
          console.error('Service Worker registration failed:', error);
        });
    }
  </script>
</body>
</html>
