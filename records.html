<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Officer Scan - Records</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .neo-shadow { box-shadow: 4px 4px 0px #000; }
    .neo-pressed:active { box-shadow: 2px 2px 0px #000; transform: translate(2px, 2px); }
    .hatch { background: repeating-linear-gradient(45deg, #000, #000 2px, transparent 2px, transparent 8px); }
  </style>
</head>
<body class="bg-white text-black min-h-screen flex flex-col">
  <header class="border-b-2 border-black px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined">signal_wifi_off</span>
      <h1 class="font-['Archivo_Narrow'] font-bold text-xl uppercase">Officer Scan</h1>
    </div>
    <button class="material-symbols-outlined p-2 hover:bg-gray-100" id="refreshBtn">refresh</button>
  </header>

  <main class="p-4 pb-20 max-w-md mx-auto">
    <!-- Sync Status -->
    <div class="border-2 border-black p-4 bg-white neo-shadow mb-6">
      <div class="flex justify-between items-center mb-3">
        <div>
          <h2 class="font-['Archivo_Narrow'] font-bold uppercase">Connectivity Hub</h2>
          <p class="font-['Inter'] text-sm text-gray-600">Records cached locally</p>
        </div>
        <div class="flex items-center gap-3">
          <div class="text-center">
            <span class="font-['Inter'] font-bold text-xs block mb-1">PENDING</span>
            <span id="pendingCount" class="bg-black text-white font-['Archivo_Narrow'] text-2xl px-4 py-1 border-2 border-black">0</span>
          </div>
        </div>
      </div>
      <button id="syncBtn" class="w-full bg-white border-2 border-black p-3 font-['Archivo_Narrow'] font-bold text-sm uppercase flex items-center justify-center gap-2 hover:bg-gray-100 neo-pressed">
        <span class="material-symbols-outlined">cloud_upload</span>
        Upload Records
      </button>
    </div>

    <!-- Records List -->
    <div class="border-2 border-black bg-white">
      <div class="border-b-2 border-black p-3 bg-gray-100 flex justify-between items-center">
        <span class="font-['Inter'] font-bold text-xs uppercase">Recent Activity</span>
        <span class="font-['Inter'] font-bold text-xs uppercase" id="currentDate">Today</span>
      </div>
      <div id="recordsList" class="divide-y-2 divide-black">
        <div class="p-4 text-center font-['Inter'] text-sm text-gray-600">No pending records</div>
      </div>
    </div>

    <!-- Summary -->
    <div class="grid grid-cols-3 gap-3 mt-6">
      <div class="border-2 border-black p-3 bg-white">
        <p class="font-['Inter'] font-bold text-xs uppercase text-gray-600 mb-1">Total</p>
        <p id="totalScanned" class="font-['Archivo_Narrow'] text-2xl">0</p>
      </div>
      <div class="border-2 border-black p-3 bg-white">
        <p class="font-['Inter'] font-bold text-xs uppercase text-gray-600 mb-1">Last Upload</p>
        <p id="lastUpload" class="font-['Archivo_Narrow'] text-lg">Never</p>
      </div>
      <div class="border-2 border-black p-3 bg-white">
        <p class="font-['Inter'] font-bold text-xs uppercase text-gray-600 mb-1">Storage</p>
        <p id="storage" class="font-['Archivo_Narrow'] text-lg">--</p>
      </div>
    </div>
  </main>

  <nav class="fixed bottom-0 left-0 w-full z-50 flex h-14 border-t-2 border-black bg-white">
    <a class="flex items-center justify-center text-black flex-1 hover:bg-gray-100" href="scanner.html">
      <span class="material-symbols-outlined">qr_code_scanner</span>
      <span class="font-['Inter'] font-bold text-xs uppercase ml-1">Scanner</span>
    </a>
    <a class="flex items-center justify-center bg-black text-white flex-1" href="records.html">
      <span class="material-symbols-outlined">history</span>
      <span class="font-['Inter'] font-bold text-xs uppercase ml-1">Records</span>
    </a>
  </nav>

  <div id="syncStatus" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 border-2 border-black font-['Inter'] font-bold text-sm"></div>

  <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!window.App.requireLogin()) return;

      var today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      document.getElementById('currentDate').textContent = 'Today - ' + today;

      var pendingCount = document.getElementById('pendingCount');
      var recordsList = document.getElementById('recordsList');
      var syncBtn = document.getElementById('syncBtn');
      var syncStatus = document.getElementById('syncStatus');
      var totalScanned = document.getElementById('totalScanned');
      var lastUpload = document.getElementById('lastUpload');
      var storage = document.getElementById('storage');
      var refreshBtn = document.getElementById('refreshBtn');

      async function loadRecords() {
        var records = await window.App.getPendingRecordsWithNames();
        var count = records.length;
        pendingCount.textContent = count;

        if (count === 0) {
          recordsList.innerHTML = '<div class="p-4 text-center font-[\'Inter\'] text-sm text-gray-600">No pending records</div>';
          syncBtn.disabled = true;
          syncBtn.innerHTML = '<span class="material-symbols-outlined">cloud_upload</span> No Records';
        } else {
          recordsList.innerHTML = records.map(function(r) {
            return '<div class="p-4 flex justify-between items-center hover:bg-gray-50"><div><p class="font-[\'Archivo_Narrow\'] font-bold text-sm uppercase">' + r.studentName + '</p><span class="font-[\'Inter\'] text-xs text-gray-500">' + window.App.formatTime(r.timestamp) + '</span></div><div class="hatch border border-black px-2 py-1"><span class="font-[\'Inter\'] font-bold text-xs uppercase">Waiting</span></div></div>';
          }).join('');
          syncBtn.disabled = false;
          syncBtn.innerHTML = '<span class="material-symbols-outlined">cloud_upload</span> Upload ' + count + ' Record' + (count > 1 ? 's' : '');
        }

        var allRecords = await window.App.db.outbox.toArray();
        totalScanned.textContent = allRecords.length;
      }

      syncBtn.addEventListener('click', async function() {
        var count = await window.App.getPendingCount();
        if (count === 0) return;

        syncBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Uploading...';
        syncBtn.disabled = true;

        try {
          await window.App.syncAttendanceRecords();
          showStatus('Records uploaded!', true);
          var now = new Date();
          lastUpload.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        } catch(e) {
          try {
            await window.App.mockSyncAttendanceRecords();
            showStatus('Uploaded (demo)', true);
          } catch(e2) {
            showStatus('Upload failed', false);
          }
        }

        loadRecords();
        syncBtn.innerHTML = '<span class="material-symbols-outlined">cloud_upload</span> Upload Records';
        syncBtn.disabled = false;
      });

      function showStatus(msg, isSuccess) {
        syncStatus.textContent = msg;
        syncStatus.className = isSuccess
          ? 'fixed top-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 border-2 border-black bg-green-100 font-[\'Inter\'] font-bold text-sm'
          : 'fixed top-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 border-2 border-red-600 bg-red-100 font-[\'Inter\'] font-bold text-sm text-red-800';
        syncStatus.classList.remove('hidden');
        setTimeout(function() { syncStatus.classList.add('hidden'); }, 5000);
      }

      refreshBtn.addEventListener('click', loadRecords);

      if (navigator.storage && navigator.storage.estimate) {
        navigator.storage.estimate().then(function(estimate) {
          storage.textContent = Math.round((estimate.usage / estimate.quota) * 100) + '%';
        });
      } else {
        storage.textContent = '12%';
      }

      loadRecords();
    });

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
  </script>
</body>
</html>
