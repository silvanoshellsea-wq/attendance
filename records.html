<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>OFFICER SCAN · Records</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.0/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;700&family=Inter:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    body { background: #f9f9f9; font-family: 'Inter', sans-serif; }
    .neo-shadow { box-shadow: 4px 4px 0 #000; }
    .active-press:active { transform: translate(4px, 4px); box-shadow: 0 0 0 #000; }
    .hatch-pattern { background: repeating-linear-gradient(45deg, #000, #000 2px, #fff 2px, #fff 6px); }
    .halftone-bg { background-image: radial-gradient(#000 1px, transparent 0); background-size: 8px 8px; opacity: 0.06; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#000000",
            surface: "#f9f9f9",
            background: "#f9f9f9",
            "on-primary": "#ffffff",
            "on-surface": "#1b1b1b",
            "on-surface-variant": "#4c4546",
            secondary: "#5d5f5f",
            "surface-container": "#e8e8e8",
            "surface-container-highest": "#e2e2e2",
            "surface-container-high": "#e8e8e8",
            "secondary-container": "#dfe0e0"
          },
          fontFamily: {
            "headline-lg": ["Archivo Narrow"],
            "headline-md": ["Archivo Narrow"],
            "headline-xl": ["Archivo Narrow"],
            "body-md": ["Inter"],
            "label-bold": ["Inter"],
            "mono-label": ["Space Mono"]
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen pb-32">

  <!-- Header -->
  <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-2 bg-background border-b-4 border-primary">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL'1;">security</span>
      <h1 class="font-headline-lg font-bold text-primary uppercase tracking-tight">OFFICER SCAN</h1>
    </div>
    <button class="material-symbols-outlined p-2 hover:bg-surface-container-high" id="refreshBtn">sync</button>
  </header>

  <main class="mt-20 max-w-4xl mx-auto px-6">
    <!-- Stats Row -->
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="border-4 border-primary bg-surface p-4 text-center">
        <p class="font-mono-label text-xs uppercase text-on-surface-variant">TOTAL SCANNED</p>
        <p id="totalScanned" class="font-headline-xl">0</p>
      </div>
      <div class="border-4 border-primary bg-surface p-4 text-center">
        <p class="font-mono-label text-xs uppercase text-on-surface-variant">LAST UPLOAD</p>
        <p id="lastUpload" class="font-headline-sm">Never</p>
      </div>
      <div class="border-4 border-primary bg-surface p-4 text-center">
        <p class="font-mono-label text-xs uppercase text-on-surface-variant">PENDING</p>
        <p id="pendingCount" class="font-headline-xl">0</p>
      </div>
    </div>

    <!-- Filter: Section Dropdown -->
    <div class="flex items-center gap-4 mb-4">
      <label for="sectionFilter" class="font-mono-label uppercase text-primary">Filter by Section:</label>
      <select id="sectionFilter" class="border-4 border-primary bg-surface px-4 py-2 font-mono-label text-primary focus:outline-none">
        <option value="ALL">All Sections</option>
      </select>
    </div>

    <!-- Sync Button -->
    <button id="syncBtn" class="w-full bg-primary text-on-primary py-4 font-headline-md uppercase border-4 border-primary neo-shadow active-press mb-6">
      UPLOAD RECORDS
    </button>

    <!-- Records List -->
    <div class="bg-surface border-4 border-primary">
      <div class="bg-primary text-on-primary px-4 py-2 font-mono-label flex justify-between">
        <span>ATTENDANCE RECORDS</span>
        <span id="currentDate">TODAY</span>
      </div>
      <div id="recordsList" class="divide-y-2 divide-primary max-h-96 overflow-y-auto p-4 font-mono-label">
        <div class="text-center text-on-surface-variant py-8">No records to display</div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-stretch h-16 bg-background border-t-4 border-primary">
    <a class="flex flex-col items-center justify-center text-on-surface hover:bg-surface-container h-full px-6" href="scanner.html">
      <span class="material-symbols-outlined">qr_code_scanner</span>
      <span class="font-mono-label uppercase mt-1">SCANNER</span>
    </a>
    <a class="flex flex-col items-center justify-center bg-primary text-on-primary h-full px-6" href="#">
      <span class="material-symbols-outlined">database</span>
      <span class="font-mono-label uppercase mt-1">RECORDS</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface hover:bg-surface-container h-full px-6" href="#">
      <span class="material-symbols-outlined">account_circle</span>
      <span class="font-mono-label uppercase mt-1">PROFILE</span>
    </a>
  </nav>

  <div id="syncStatus" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-50 px-6 py-3 border-4 font-headline-md text-center"></div>

  <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {   // ← FIX: added 'async'
      if (!window.App.requireLogin()) return;

      var today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      document.getElementById('currentDate').textContent = today.toUpperCase();

      var pendingCount = document.getElementById('pendingCount');
      var totalScanned = document.getElementById('totalScanned');
      var lastUpload = document.getElementById('lastUpload');
      var recordsList = document.getElementById('recordsList');
      var syncBtn = document.getElementById('syncBtn');
      var syncStatus = document.getElementById('syncStatus');
      var sectionFilter = document.getElementById('sectionFilter');

      // Populate section dropdown
      async function populateSectionFilter() {
        var students = await window.App.getAllStudents();
        var sections = new Set();
        students.forEach(s => sections.add(s.section));
        var currentFilter = sectionFilter.value;
        sectionFilter.innerHTML = '<option value="ALL">All Sections</option>';
        sections.forEach(sec => {
          var opt = document.createElement('option');
          opt.value = sec;
          opt.textContent = sec;
          if (sec === currentFilter) opt.selected = true;
          sectionFilter.appendChild(opt);
        });
      }

      // Load records with optional section filter
      async function loadRecords() {
        var allRecords = await window.App.db.outbox.toArray();
        var selectedSection = sectionFilter.value;

        // Filter by section if not "ALL"
        var filteredRecords = allRecords;
        if (selectedSection !== 'ALL') {
          var students = await window.App.getAllStudents();
          var studentMap = {};
          students.forEach(s => studentMap[s.id] = s);
          filteredRecords = allRecords.filter(r => {
            var student = studentMap[r.studentId];
            return student && student.section === selectedSection;
          });
        }

        totalScanned.textContent = allRecords.length;

        var pendingRecords = allRecords.filter(r => !r.synced);
        pendingCount.textContent = pendingRecords.length;

        if (filteredRecords.length === 0) {
          recordsList.innerHTML = '<div class="text-center text-on-surface-variant py-8">No records to display</div>';
          return;
        }

        // Group by studentId and date (YYYY-MM-DD)
        var groups = {};
        filteredRecords.forEach(record => {
          var date = new Date(record.timestamp).toISOString().split('T')[0];
          var key = record.studentId + '|' + date;
          if (!groups[key]) {
            groups[key] = { studentId: record.studentId, date: date, times: [] };
          }
          groups[key].times.push(record.timestamp);
        });

        var groupArray = Object.values(groups);
        groupArray.sort((a, b) => {
          if (a.date !== b.date) return b.date.localeCompare(a.date);
          return a.studentName?.localeCompare(b.studentName) || 0;
        });

        var html = '';
        for (var g of groupArray) {
          var student = await window.App.getStudentById(g.studentId);
          var studentName = student ? student.name : g.studentId;
          var section = student ? student.section : 'Unknown';
          g.studentName = studentName;
          g.section = section;

          g.times.sort();
          var timeIn = g.times[0] || null;
          var timeOut = g.times[1] || null;
          var timeInDisplay = timeIn ? new Date(timeIn).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) : '';
          var timeOutDisplay = timeOut ? new Date(timeOut).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) : '';

          var hasPending = g.times.some(t => {
            var rec = filteredRecords.find(r => r.timestamp === t && !r.synced);
            return rec !== undefined;
          });
          var statusBadge = hasPending
            ? '<span class="bg-yellow-100 text-yellow-800 px-2 py-1 text-xs uppercase">Pending</span>'
            : '<span class="bg-green-100 text-green-800 px-2 py-1 text-xs uppercase">Synced</span>';

          html += `<div class="flex justify-between items-center py-3 border-b border-gray-200">
            <div>
              <p class="font-bold uppercase">${studentName}</p>
              <p class="text-xs text-on-surface-variant">${section} • ${g.date}</p>
              <div class="flex gap-4 mt-1 text-sm">
                <span>⏰ In: ${timeInDisplay}</span>
                <span>⏰ Out: ${timeOutDisplay}</span>
              </div>
            </div>
            ${statusBadge}
          </div>`;
        }

        recordsList.innerHTML = html;

        syncBtn.disabled = pendingRecords.length === 0;
        syncBtn.textContent = pendingRecords.length > 0 ? 'UPLOAD ' + pendingRecords.length + ' RECORDS' : 'NO PENDING RECORDS';
      }

      // Sync button click
      syncBtn.addEventListener('click', async function() {
        var count = await window.App.getPendingCount();
        if (count === 0) return;

        syncBtn.textContent = 'UPLOADING...';
        syncBtn.disabled = true;

        try {
          await window.App.syncAttendanceRecords();
          showStatus('Records uploaded successfully!', true);
          var now = new Date();
          lastUpload.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        } catch(e) {
          try {
            await window.App.mockSyncAttendanceRecords();
            showStatus('Upload complete (demo)', true);
          } catch(e2) {
            showStatus('Upload failed', false);
          }
        }

        loadRecords();
        syncBtn.disabled = false;
      });

      function showStatus(msg, ok) {
        syncStatus.textContent = msg;
        syncStatus.className = ok
          ? 'fixed top-20 left-1/2 -translate-x-1/2 z-50 px-6 py-3 border-4 border-primary bg-green-100 font-headline-md'
          : 'fixed top-20 left-1/2 -translate-x-1/2 z-50 px-6 py-3 border-4 border-red-600 bg-red-100 font-headline-md text-red-800';
        syncStatus.classList.remove('hidden');
        setTimeout(function() { syncStatus.classList.add('hidden'); }, 3000);
      }

      document.getElementById('refreshBtn').addEventListener('click', loadRecords);
      sectionFilter.addEventListener('change', loadRecords);

      await populateSectionFilter();
      await loadRecords();
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
