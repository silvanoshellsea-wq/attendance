<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFFICER SCAN - QR Interface</title>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-secondary": "#ffffff",
            "on-secondary-fixed": "#1a1c1c",
            "surface-container-low": "#f3f3f3",
            "on-tertiary-fixed-variant": "#474747",
            "surface-container-lowest": "#ffffff",
            "surface-bright": "#f9f9f9",
            "primary": "#000000",
            "secondary-fixed": "#e2e2e2",
            "on-tertiary": "#ffffff",
            "inverse-primary": "#c6c6c6",
            "on-error-container": "#93000a",
            "surface-variant": "#e2e2e2",
            "on-error": "#ffffff",
            "on-surface": "#1a1c1c",
            "error": "#ba1a1a",
            "on-background": "#1a1c1c",
            "background": "#f9f9f9",
            "surface-container": "#eeeeee",
            "outline": "#7e7576",
            "primary-fixed-dim": "#c6c6c6",
            "on-tertiary-container": "#858383",
            "tertiary-container": "#1b1c1c",
            "on-primary-container": "#848484",
            "surface-tint": "#5e5e5e",
            "surface-container-high": "#e8e8e8",
            "surface-dim": "#dadada",
            "secondary": "#5d5f5f",
            "tertiary": "#000000",
            "inverse-on-surface": "#f1f1f1",
            "inverse-surface": "#2f3131",
            "on-tertiary-fixed": "#1b1c1c",
            "on-primary": "#ffffff",
            "on-secondary-container": "#616363",
            "error-container": "#ffdad6",
            "on-primary-fixed": "#1b1b1b",
            "secondary-fixed-dim": "#c6c6c7",
            "tertiary-fixed-dim": "#c8c6c6",
            "secondary-container": "#dfe0e0",
            "on-primary-fixed-variant": "#474747",
            "on-surface-variant": "#4c4546",
            "tertiary-fixed": "#e4e2e1",
            "primary-container": "#1b1b1b",
            "outline-variant": "#cfc4c5",
            "surface": "#f9f9f9",
            "on-secondary-fixed-variant": "#454747",
            "surface-container-highest": "#e2e2e2",
            "primary-fixed": "#e2e2e2"
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          spacing: {
            "xs": "4px",
            "lg": "48px",
            "sm": "12px",
            "md": "24px",
            "shadow-offset": "4px",
            "base": "8px",
            "xl": "80px",
            "border-weight": "2px"
          },
          fontFamily: {
            "headline-xl": ["Archivo Narrow"],
            "headline-sm": ["Archivo Narrow"],
            "body-sm": ["Inter"],
            "headline-lg": ["Archivo Narrow"],
            "body-lg": ["Inter"],
            "headline-md": ["Archivo Narrow"],
            "body-md": ["Inter"],
            "label-bold": ["Inter"],
            "mono-label": ["Inter"]
          },
          fontSize: {
            "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
            "headline-sm": ["18px", {"lineHeight": "1.2", "fontWeight": "700"}],
            "body-sm": ["14px", {"lineHeight": "1.4", "fontWeight": "400"}],
            "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
            "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
            "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
            "label-bold": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}],
            "mono-label": ["13px", {"lineHeight": "1", "letterSpacing": "0", "fontWeight": "500"}]
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;700;800&family=Inter:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .inked-border { border: 2px solid #000000; }
    .inked-shadow { box-shadow: 4px 4px 0px #000000; }
    .inked-shadow-active { box-shadow: 2px 2px 0px #000000; transform: translate(2px, 2px); }

    .halftone-pattern {
      background-image: radial-gradient(#000 10%, transparent 11%);
      background-size: 8px 8px;
    }

    .scan-line {
      height: 4px;
      background: #000;
      position: absolute;
      width: 100%;
      top: 0;
      animation: scan 3s linear infinite;
      z-index: 20;
    }

    @keyframes scan {
      0% { top: 0; }
      50% { top: 100%; }
      100% { top: 0; }
    }

    .hatch-pattern {
      background: repeating-linear-gradient(45deg, #000, #000 2px, transparent 2px, transparent 8px);
    }

    .dot-grid {
      background-image: radial-gradient(circle, #000 1px, transparent 1px);
      background-size: 16px 16px;
      opacity: 0.05;
    }

    /* Overlay transitions */
    #success-overlay, #error-overlay, #duplicate-overlay {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
  </style>
</head>

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative overflow-hidden">
  <div class="fixed inset-0 dot-grid pointer-events-none"></div>

  <!-- Top Navigation -->
  <nav class="flex justify-between items-center px-md py-base w-full z-50 bg-surface border-b-2 border-primary">
    <div class="flex items-center gap-base">
      <span class="material-symbols-outlined text-primary">signal_wifi_off</span>
      <h1 class="font-headline-md text-headline-md font-bold text-primary uppercase tracking-tight">OFFICER SCAN</h1>
    </div>
    <div class="flex items-center gap-sm">
      <button class="material-symbols-outlined p-xs hover:bg-surface-container-high transition-colors" id="logoutBtn">logout</button>
    </div>
  </nav>

  <main class="flex-1 relative flex flex-col items-center justify-center p-md overflow-hidden">
    <!-- Camera Viewfinder Wrapper -->
    <div class="relative w-full max-w-md aspect-square inked-border bg-black group overflow-hidden">
      <!-- The actual camera view from html5-qrcode -->
      <div id="reader" class="absolute inset-0"></div>
      <div class="scan-line"></div>

      <!-- Corner brackets (decorative) -->
      <div class="absolute top-0 left-0 w-12 h-12 border-t-8 border-l-8 border-white m-md"></div>
      <div class="absolute top-0 right-0 w-12 h-12 border-t-8 border-r-8 border-white m-md"></div>
      <div class="absolute bottom-0 left-0 w-12 h-12 border-b-8 border-l-8 border-white m-md"></div>
      <div class="absolute bottom-0 right-0 w-12 h-12 border-b-8 border-r-8 border-white m-md"></div>

      <!-- Success Overlay -->
      <div id="success-overlay" class="absolute inset-0 bg-white/90 z-30 flex flex-col items-center justify-center p-lg">
        <div class="inked-border bg-white p-lg flex flex-col items-center gap-md inked-shadow">
          <span class="material-symbols-outlined text-7xl font-bold">check_circle</span>
          <h2 class="font-headline-lg text-headline-lg uppercase text-center">ALLOWED</h2>
          <div class="w-full h-2 bg-surface-container-high border border-black">
            <div class="h-full hatch-pattern" style="width: 100%"></div>
          </div>
          <p id="successStudentName" class="font-mono-label text-mono-label text-center"></p>
        </div>
      </div>

      <!-- Error Overlay -->
      <div id="error-overlay" class="absolute inset-0 bg-black/80 z-30 flex flex-col items-center justify-center p-lg">
        <div class="inked-border bg-white p-lg flex flex-col items-center gap-md inked-shadow">
          <span class="material-symbols-outlined text-7xl font-bold">cancel</span>
          <h2 class="font-headline-lg text-headline-lg uppercase text-center text-primary">ACCESS DENIED</h2>
          <div class="w-full h-8 flex items-center justify-center bg-primary text-white font-label-bold px-sm">SECURITY ALERT</div>
          <p id="errorMessage" class="font-mono-label text-mono-label text-center">STUDENT NOT IN SECTION</p>
        </div>
      </div>

      <!-- Duplicate Overlay -->
      <div id="duplicate-overlay" class="absolute inset-0 bg-yellow-100/90 z-30 flex flex-col items-center justify-center p-lg">
        <div class="inked-border bg-white p-lg flex flex-col items-center gap-md inked-shadow">
          <span class="material-symbols-outlined text-7xl font-bold">warning</span>
          <h2 class="font-headline-lg text-headline-lg uppercase text-center">ALREADY CHECKED IN</h2>
          <p id="duplicateStudentName" class="font-mono-label text-mono-label text-center"></p>
        </div>
      </div>
    </div>

    <!-- Bottom nav (unchanged) -->
    <div class="mt-lg w-full max-w-md flex gap-md">
      <button id="syncTabBtn" class="flex-1 bg-white inked-border font-headline-sm text-headline-sm py-base inked-shadow active:translate-x-xs active:translate-y-xs active:shadow-none transition-all uppercase">
        VIEW RECORDS
      </button>
    </div>
  </main>

  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-stretch h-xl bg-surface border-t-2 border-primary">
    <a class="flex flex-col items-center justify-center bg-primary text-on-primary p-sm flex-1 group transition-all" href="scanner.html">
      <span class="material-symbols-outlined">qr_code_scanner</span>
      <span class="font-label-bold text-label-bold uppercase mt-xs">SCANNER</span>
    </a>
    <a class="flex flex-col items-center justify-center text-secondary p-sm flex-1 hover:bg-secondary-container transition-all" href="records.html">
      <span class="material-symbols-outlined">history</span>
      <span class="font-label-bold text-label-bold uppercase mt-xs">RECORDS</span>
    </a>
  </nav>

  <!-- Libraries -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
  <script src="app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!window.App.requireLogin()) return;

      const successOverlay = document.getElementById('success-overlay');
      const errorOverlay = document.getElementById('error-overlay');
      const duplicateOverlay = document.getElementById('duplicate-overlay');
      const logoutBtn = document.getElementById('logoutBtn');
      const syncTabBtn = document.getElementById('syncTabBtn');

      logoutBtn.addEventListener('click', () => {
        window.App.logout();
        window.location.href = 'index.html';
      });

      syncTabBtn.addEventListener('click', () => {
        window.location.href = 'records.html';
      });

      // Start the QR scanner (from app.js)
      window.App.startScanner(
        // onScanSuccess callback
        (student) => {
          // student is an object: { id, name, section }
          document.getElementById('successStudentName').textContent = `ID: ${student.id} - ${student.name}`;
          successOverlay.style.opacity = '1';
          successOverlay.style.pointerEvents = 'auto';
          setTimeout(() => {
            successOverlay.style.opacity = '0';
            successOverlay.style.pointerEvents = 'none';
          }, 2000);
        },
        // onScanError callback (e.g., wrong section)
        (message) => {
          document.getElementById('errorMessage').textContent = message;
          errorOverlay.style.opacity = '1';
          errorOverlay.style.pointerEvents = 'auto';
          setTimeout(() => {
            errorOverlay.style.opacity = '0';
            errorOverlay.style.pointerEvents = 'none';
          }, 2000);
        },
        // onScanDuplicate callback
        (student) => {
          document.getElementById('duplicateStudentName').textContent = `ID: ${student.id} - ${student.name}`;
          duplicateOverlay.style.opacity = '1';
          duplicateOverlay.style.pointerEvents = 'auto';
          setTimeout(() => {
            duplicateOverlay.style.opacity = '0';
            duplicateOverlay.style.pointerEvents = 'none';
          }, 2000);
        }
      );
    });
  </script>
</body>
</html>
