<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Officer Scan - Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@700&family=Inter:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .neo-shadow { box-shadow: 4px 4px 0 #000; }
    .neo-pressed:active { box-shadow: 2px 2px 0 #000; transform: translate(2px, 2px); }
    .scan-line { height: 4px; background: #000; position: absolute; width: 100%; top: 0; animation: scan 3s linear infinite; z-index: 20; }
    @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
    .halftone { background-image: radial-gradient(#000 1px, transparent 0); background-size: 8px 8px; opacity: 0.05; }
  </style>
</head>
<body class="bg-gray-50 text-black min-h-screen flex flex-col">

  <header class="border-b-2 border-black px-6 py-4 flex justify-between items-center bg-white">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-black">signal_wifi_off</span>
      <h1 class="font-['Archivo_Narrow'] font-bold text-xl uppercase tracking-tight">Officer Scan</h1>
    </div>
    <button type="button" class="material-symbols-outlined p-2 hover:bg-gray-100">settings</button>
  </header>

  <main class="flex-grow p-4 flex flex-col items-center">
    <!-- Officer Info -->
    <div class="w-full max-w-md mb-4">
      <div class="border-2 border-black bg-white p-4 flex justify-between items-center">
        <div>
          <p class="font-['Archivo_Narrow'] font-bold text-lg uppercase" id="officerName">Loading...</p>
          <p class="font-['Space_Mono'] text-sm text-gray-600" id="officerSection">Loading...</p>
        </div>
        <button type="button" class="material-symbols-outlined p-2 hover:bg-gray-100" id="logoutBtn">logout</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="w-full max-w-md flex gap-2 mb-4">
      <button type="button" class="flex-1 bg-black text-white py-3 font-['Archivo_Narrow'] font-bold text-sm uppercase border-2 border-black" id="scannerTabBtn">
        Scanner
      </button>
      <button type="button" class="flex-1 bg-white text-black py-3 font-['Archivo_Narrow'] font-bold text-sm uppercase border-2 border-black hover:bg-gray-100" id="recordsTabBtn">
        Records
      </button>
    </div>

    <!-- Scanner Tab -->
    <div id="scannerTab" class="w-full max-w-md">
      <div class="relative w-full aspect-square border-2 border-black bg-black group overflow-hidden">
        <div id="reader" class="absolute inset-0"></div>
        <div class="scan-line"></div>
        <div class="absolute top-0 left-0 w-8 h-8 border-l-2 border-t-2 border-white m-2"></div>
        <div class="absolute top-0 right-0 w-8 h-8 border-r-2 border-t-2 border-white m-2"></div>
        <div class="absolute bottom-0 left-0 w-8 h-8 border-l-2 border-b-2 border-white m-2"></div>
        <div class="absolute bottom-0 right-0 w-8 h-8 border-r-2 border-b-2 border-white m-2"></div>

        <!-- Success Overlay -->
        <div id="successOverlay" class="absolute inset-0 bg-white/95 z-30 flex items-center justify-center p-4 opacity-0 pointer-events-none">
          <div class="border-2 border-black bg-white p-4 neo-shadow text-center">
            <span class="material-symbols-outlined text-5xl text-green-600">check_circle</span>
            <p id="successDetails" class="font-['Archivo_Narrow'] font-bold text-lg mt-2">Allowed</p>
          </div>
        </div>

        <!-- Error Overlay -->
        <div id="errorOverlay" class="absolute inset-0 bg-black/90 z-30 flex items-center justify-center p-4 opacity-0 pointer-events-none">
          <div class="border-2 border-white bg-black p-4 text-center">
            <span class="material-symbols-outlined text-5xl text-white">cancel</span>
            <p id="errorTitle" class="font-['Archivo_Narrow'] font-bold text-lg text-white mt-2">Denied</p>
            <p id="errorDetails" class="font-['Space_Mono'] text-xs text-gray-400 mt-1"></p>
          </div>
        </div>
      </div>

      <p class="text-center mt-3 font-['Space_Mono'] text-xs text-gray-500">Position QR code in frame</p>

      <div id="rosterWarning" class="hidden mt-3 p-2 bg-yellow-100 border border-yellow-600 font-['Inter'] text-xs text-center">
        Roster not loaded
      </div>
    </div>

    <!-- Records Tab -->
    <div id="recordsTab" class="w-full max-w-md hidden">
      <div class="border-2 border-black bg-white p-4">
        <div class="flex justify-between items-center mb-3">
          <span class="font-['Archivo_Narrow'] font-bold text-sm uppercase">Pending</span>
          <span id="pendingCount" class="bg-black text-white px-3 py-1 font-['Archivo_Narrow'] font-bold">0</span>
        </div>
        <div id="pendingList" class="border border-black max-h-40 overflow-y-auto text-sm">
          <div class="p-3 text-center text-gray-500">No records</div>
        </div>
        <button type="button" id="syncBtn" class="w-full mt-3 bg-black text-white border-2 border-black py-2 font-['Archivo_Narrow'] text-sm uppercase hover:bg-white hover:text-black transition-colors">
          Upload
        </button>
        <div id="syncStatus" class="hidden mt-2 p-2 border border-black text-xs text-center"></div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 w-full flex h-14 border-t-2 border-black bg-white z-50">
    <a href="scanner.html" class="flex-1 flex items-center justify-center bg-black text-white font-['Inter'] text-xs uppercase font-bold">
      Scanner
    </a>
    <a href="records.html" class="flex-1 flex items-center justify-center bg-white text-black font-['Inter'] text-xs uppercase font-bold border-l-2 border-black hover:bg-gray-50">
      Records
    </a>
  </nav>

  <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!window.App.requireLogin()) return;

      var officer = window.App.getOfficerInfo();
      document.getElementById('officerName').textContent = officer.name;
      document.getElementById('officerSection').textContent = officer.section;

      var logoutBtn = document.getElementById('logoutBtn');
      var scannerTabBtn = document.getElementById('scannerTabBtn');
      var recordsTabBtn = document.getElementById('recordsTabBtn');
      var scannerTab = document.getElementById('scannerTab');
      var recordsTab = document.getElementById('recordsTab');
      var successOverlay = document.getElementById('successOverlay');
      var errorOverlay = document.getElementById('errorOverlay');
      var successDetails = document.getElementById('successDetails');
      var errorTitle = document.getElementById('errorTitle');
      var errorDetails = document.getElementById('errorDetails');
      var rosterWarning = document.getElementById('rosterWarning');
      var pendingCount = document.getElementById('pendingCount');
      var pendingList = document.getElementById('pendingList');
      var syncBtn = document.getElementById('syncBtn');
      var syncStatus = document.getElementById('syncStatus');

      var html5QrCode = null;
      var isScanning = false;

      scannerTabBtn.addEventListener('click', function() {
        scannerTab.classList.remove('hidden');
        recordsTab.classList.add('hidden');
        scannerTabBtn.classList.add('bg-black', 'text-white');
        scannerTabBtn.classList.remove('bg-white', 'text-black');
        recordsTabBtn.classList.add('bg-white', 'text-black');
        recordsTabBtn.classList.remove('bg-black', 'text-white');
        startScanner();
      });

      recordsTabBtn.addEventListener('click', function() {
        scannerTab.classList.add('hidden');
        recordsTab.classList.remove('hidden');
        recordsTabBtn.classList.add('bg-black', 'text-white');
        recordsTabBtn.classList.remove('bg-white', 'text-black');
        scannerTabBtn.classList.add('bg-white', 'text-black');
        scannerTabBtn.classList.remove('bg-black', 'text-white');
        stopScanner();
        loadPendingRecords();
      });

      logoutBtn.addEventListener('click', function() { stopScanner(); window.App.logout(); });

      function startScanner() {
        if (!window.App.isRosterCached()) { rosterWarning.classList.remove('hidden'); return; }
        rosterWarning.classList.add('hidden');
        if (html5QrCode && !isScanning) { try { html5QrCode.resume(); isScanning = true; } catch(e) { startScannerNew(); } return; }
        startScannerNew();
      }

      async function startScannerNew() {
        try {
          html5QrCode = new Html5Qrcode('reader');
          await html5QrCode.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 200, height: 200 } }, onScanSuccess, function() {});
          isScanning = true;
        } catch(err) { showError('Camera Error', 'Cannot access camera'); }
      }

      function stopScanner() { if (html5QrCode && isScanning) { html5QrCode.stop().catch(function() {}); isScanning = false; } }

      async function onScanSuccess(text) {
        if (html5QrCode && isScanning) try { await html5QrCode.pause(); } catch(e) {}
        await processScan(text.trim().toUpperCase());
      }

      async function processScan(studentId) {
        var student = await window.App.getStudentById(studentId);
        if (!student) { showError('Not Found', 'Student not in roster'); return; }
        if (student.section !== officer.section) { showError('Wrong Section', student.section); return; }
        var result = await window.App.recordAttendance(studentId, officer.code);
        if (result.success) { showSuccess(student.name + ' - ' + student.section); updatePendingCount(); }
        else if (result.reason === 'duplicate') { showError('Already In', student.name); }
        else { showError('Error', 'Failed to record'); }
      }

      function showSuccess(details) {
        successDetails.textContent = details;
        successOverlay.style.opacity = '1';
        successOverlay.style.pointerEvents = 'auto';
        setTimeout(function() {
          successOverlay.style.opacity = '0';
          successOverlay.style.pointerEvents = 'none';
          if (html5QrCode && isScanning) html5QrCode.resume().catch(function() {});
        }, 2000);
      }

      function showError(title, details) {
        errorTitle.textContent = title;
        errorDetails.textContent = details;
        errorOverlay.style.opacity = '1';
        errorOverlay.style.pointerEvents = 'auto';
        setTimeout(function() {
          errorOverlay.style.opacity = '0';
          errorOverlay.style.pointerEvents = 'none';
          if (html5QrCode && isScanning) html5QrCode.resume().catch(function() {});
        }, 2000);
      }

      async function loadPendingRecords() {
        var records = await window.App.getPendingRecordsWithNames();
        var count = records.length;
        pendingCount.textContent = count;
        if (count === 0) {
          pendingList.innerHTML = '<div class="p-3 text-center text-gray-500">No records</div>';
          syncBtn.disabled = true;
        } else {
          pendingList.innerHTML = records.map(function(r) {
            return '<div class="flex justify-between p-2 border-b border-black"><span class="font-bold uppercase">' + r.studentName + '</span><span class="text-gray-500">' + window.App.formatTime(r.timestamp) + '</span></div>';
          }).join('');
          syncBtn.disabled = false;
        }
      }

      async function updatePendingCount() {
        var count = await window.App.getPendingCount();
        if (!recordsTab.classList.contains('hidden')) loadPendingRecords();
      }

      syncBtn.addEventListener('click', async function() {
        if (!navigator.onLine) { showSyncStatus('No internet', false); return; }
        var pending = await window.App.getPendingCount();
        if (pending === 0) { showSyncStatus('No records', true); return; }
        syncBtn.textContent = 'Uploading...';
        syncBtn.disabled = true;
        try { await window.App.syncAttendanceRecords(); showSyncStatus('Uploaded!', true); }
        catch(e) { try { await window.App.mockSyncAttendanceRecords(); showSyncStatus('Done (demo)', true); } catch(e2) { showSyncStatus('Failed', false); } }
        loadPendingRecords();
        syncBtn.textContent = 'Upload';
        syncBtn.disabled = false;
      });

      function showSyncStatus(msg, ok) {
        syncStatus.textContent = msg;
        syncStatus.className = ok ? 'mt-2 p-2 border border-black bg-green-100 text-xs text-center' : 'mt-2 p-2 border border-red-600 bg-red-100 text-xs text-center text-red-800';
        syncStatus.classList.remove('hidden');
        setTimeout(function() { syncStatus.classList.add('hidden'); }, 3000);
      }

      if (!window.App.isRosterCached()) rosterWarning.classList.remove('hidden');
      startScanner();
    });
  </script>
</body>
</html>
